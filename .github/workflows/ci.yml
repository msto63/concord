name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax-check all shell scripts
        run: |
          set -e
          fail=0
          for f in bin/coord.sh bin/concord hooks/*.sh scripts/*.sh; do
            if bash -n "$f"; then echo "ok   $f"; else echo "FAIL $f"; fail=1; fi
          done
          exit $fail

      - name: shellcheck (advisory)
        continue-on-error: true
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck -S warning bin/coord.sh bin/concord hooks/*.sh scripts/*.sh || true

      - name: Enforce version discipline
        run: bash scripts/check-version.sh
